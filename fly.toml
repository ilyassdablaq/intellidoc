app = "intellidoc-backend"
primary_region = "fra"

[build]

[env]
  NODE_ENV = "production"
  DB_SSL = "true"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "30s"
    interval = "15s"
    method = "GET"
    path = "/healthz"
    protocol = "http"
    timeout = "10s"
